name: ds-bench

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://localhost:9000 minioadmin minioadmin && mc ready local"]
      interval: 3s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/durable-streams &&
      mc mb -p local/ursula &&
      mc mb -p local/s2-bench &&
      echo 'buckets ready'
      "

  durable-streams:
    build:
      context: ../durable-streams
      dockerfile: ../ds-rust-bench/dockerfiles/durable-streams.Dockerfile
    image: ds-bench/durable-streams:dev
    depends_on:
      minio:
        condition: service_healthy
    environment:
      DS_S3_ACCESS_KEY_ID: minioadmin
      DS_S3_SECRET_ACCESS_KEY: minioadmin
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "4438"
      - --data-dir
      - /data
      - --tier
      - s3
      - --tier-endpoint
      - http://minio:9000
      - --tier-region
      - us-east-1
      - --tier-bucket
      - durable-streams
      - --tier-allow-http
    ports:
      - "4438:4438"

  ursula:
    build:
      context: vendor/ursula
      dockerfile: Dockerfile
    image: ds-bench/ursula:dev
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./config/ursula.toml:/ursula.toml:ro
    command: ["--config", "/ursula.toml", "--preset", "standard"]
    ports:
      - "4437:4437"

  s2lite:
    image: ghcr.io/s2-streamstore/s2:latest
    depends_on:
      minio:
        condition: service_healthy
    command: ["lite", "--bucket", "s2-bench", "--path", "s2lite", "--port", "80"]
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL_S3: http://minio:9000
    ports:
      - "4439:80"

  bench:
    build:
      context: ./ds-bench
      dockerfile: ../dockerfiles/ds-bench.Dockerfile
    image: ds-bench/ds-bench:dev
    profiles: ["bench"]   # only runs when explicitly invoked
    volumes:
      - ./results:/results
    # command is supplied at run time by run-bench.sh
