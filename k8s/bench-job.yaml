apiVersion: batch/v1
kind: Job
metadata:
  name: bench-fleet
spec:
  completions: 2
  parallelism: 2
  completionMode: Indexed
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ds-bench
          image: ds-bench/ds-bench:dev
          imagePullPolicy: Never
          env:
            - { name: DS_BENCH_HDR_OUT, value: /results }
          command: ["/bin/sh", "-c"]
          args:
            - >
              ds-bench multi-stream --target http://durable-streams:4438 --api-style durable
              --streams 20 --duration-secs 15 --payload-bytes 256
              > /results/ms-${JOB_COMPLETION_INDEX}.json
          volumeMounts:
            - { name: results, mountPath: /results }
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: bench-results
