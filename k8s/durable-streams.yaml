apiVersion: apps/v1
kind: Deployment
metadata:
  name: durable-streams
  labels:
    app: durable-streams
spec:
  replicas: 1
  selector:
    matchLabels:
      app: durable-streams
  template:
    metadata:
      labels:
        app: durable-streams
    spec:
      containers:
        - name: durable-streams
          image: ds-bench/durable-streams:dev
          imagePullPolicy: Never
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "4438"
            - "--data-dir"
            - "/data"
            - "--tier"
            - "s3"
            - "--tier-endpoint"
            - "http://minio:9000"
            - "--tier-region"
            - "us-east-1"
            - "--tier-bucket"
            - "durable-streams"
            - "--tier-allow-http"
          env:
            - name: DS_S3_ACCESS_KEY_ID
              value: minioadmin
            - name: DS_S3_SECRET_ACCESS_KEY
              value: minioadmin
          ports:
            - containerPort: 4438
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: durable-streams
spec:
  selector:
    app: durable-streams
  ports:
    - port: 4438
      targetPort: 4438
