apiVersion: batch/v1
kind: Job
metadata:
  name: bench-coordinator
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: coordinator
          image: ds-bench/ds-bench:dev
          imagePullPolicy: Never
          command: ["/bin/sh", "-c"]
          args:
            - "ds-bench hdr-merge --hdr-dir /results --results-dir /results > /results/merged.json && cat /results/merged.json"
          volumeMounts:
            - { name: results, mountPath: /results }
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: bench-results
