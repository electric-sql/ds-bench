apiVersion: batch/v1
kind: Job
metadata: { name: micro, namespace: ds-bench }
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector: { role: server }
      containers:
      - name: micro
        image: europe-west1-docker.pkg.dev/vaxine/ds-bench/micro:dev
        imagePullPolicy: Always
        securityContext: { privileged: true }   # needed for drop_caches in the cold study
        env:
        - { name: PROFILE, value: "fast" }
        - { name: SERVER_CPUS, value: "0-5" }
        - { name: CLIENT_CPUS, value: "6-7" }
        - { name: BENCH_ALLOWED_CPUS, value: "0-6" }
        - { name: RUN_ID, value: "REPLACE_RUN_ID" }
        # The current durable-streams server is a SINGLE-ENGINE raw build: it has
        # no --http-engine selector (only --read-offload inline|tail|always). Tell
        # the suite to skip --http-engine and sweep raw read-offload modes instead.
        - { name: NO_HTTP_ENGINE_FLAG, value: "1" }
        - { name: ENGINES, value: "raw" }
        - { name: ENGINE_SPECS, value: "raw:tail raw:inline" }
        # Core studies don't need the object store; tiering deferred (no tier binary
        # in this image + GCS S3-compat tier unverified). Override via STUDIES env.
        - { name: STUDIES, value: "engines cpu_scaling splice" }
        # GCS object store (S3-compatible HMAC creds) — see Secret gcs-hmac.
        - { name: GCS_BUCKET, value: "vaxine-ds-bench-tier" }
        - name: GCS_HMAC_KEY
          valueFrom: { secretKeyRef: { name: gcs-hmac, key: access_id } }
        - name: GCS_HMAC_SECRET
          valueFrom: { secretKeyRef: { name: gcs-hmac, key: secret } }
        command: ["bash","-lc"]
        args:
        - |
          bash run.sh
          mc alias set gcs https://storage.googleapis.com "${GCS_HMAC_KEY}" "${GCS_HMAC_SECRET}"
          mc cp --recursive /micro/out/ "gcs/${GCS_BUCKET}/micro-${RUN_ID}/"
        resources:
          requests: { cpu: "7", memory: "24Gi" }
        volumeMounts:
        - { name: data, mountPath: /data }
      volumes:
      - { name: data, emptyDir: {} }
