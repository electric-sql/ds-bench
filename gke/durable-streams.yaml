# DS-rust durable-streams server for Phase 2b, on the NVMe role=server node.
# Data-dir on local-SSD emptyDir for fast fsync; cold tier offloaded to the
# in-cluster MinIO `durable-streams` bucket. Raw-only, separate-token args
# (identical to Phase 2a). ${PROJECT} is substituted (sed/envsubst) by the
# run scripts before apply.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: durable-streams
  namespace: ds-bench
  labels:
    app: durable-streams
spec:
  replicas: 1
  selector:
    matchLabels:
      app: durable-streams
  template:
    metadata:
      labels:
        app: durable-streams
    spec:
      nodeSelector: { role: server }
      containers:
        - name: durable-streams
          image: europe-west1-docker.pkg.dev/${PROJECT}/ds-bench/durable-streams:dev
          imagePullPolicy: Always
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "4438"
            - "--data-dir"
            - "/data"
            - "--tier"
            - "s3"
            - "--tier-endpoint"
            - "http://minio:9000"
            - "--tier-region"
            - "us-east-1"
            - "--tier-bucket"
            - "durable-streams"
            - "--tier-allow-http"
          env:
            - name: DS_S3_ACCESS_KEY_ID
              value: minioadmin
            - name: DS_S3_SECRET_ACCESS_KEY
              value: minioadmin
          ports:
            - containerPort: 4438
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests:
              memory: "2Gi"
              cpu: "2"
            limits:
              memory: "6Gi"
      volumes:
        - name: data
          emptyDir: { medium: "" }
---
apiVersion: v1
kind: Service
metadata:
  name: durable-streams
  namespace: ds-bench
spec:
  selector:
    app: durable-streams
  ports:
    - port: 4438
      targetPort: 4438
