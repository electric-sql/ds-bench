# ursula Helm values (single-node, Phase 2b). PER THE USER DECISION ursula runs
# at a SINGLE node only; multi-node (1/3/5) is deferred to Phase 3.
#
# NOTE: the actual deploy uses the plain Deployment in gke/ursula.yaml (the
# acceptable fallback the plan calls out: "If Helm is fiddly, a plain Deployment
# mirroring config/ursula.toml single-node is an acceptable fallback"). The
# vendor chart (vendor/ursula/charts/ursula) is built for 1/3/5 StatefulSet
# topologies with a separate gateway, TLS, and PDБs — none of which a single
# node needs, and which complicate matched-durability single-node config. These
# values are kept for the record / a future Phase-3 multi-node revisit.
global:
  image:
    repository: europe-west1-docker.pkg.dev/vaxine/ds-bench/ursula
    tag: dev
    pullPolicy: Always

server:
  replicaCount: 1            # SINGLE node (USER DECISION; multi-node -> Phase 3)
  ports:
    port: 4437
  pod:
    nodeSelector:
      role: server
  # Matched durability: disk WAL Raft + MinIO cold tier.
  raft:
    wal:
      backend: disk
  storage:
    cold:
      enabled: true
      backend: s3
      s3:
        bucket: ursula
        endpoint: http://minio:9000
        region: us-east-1
        accessKeyId: minioadmin
        secretAccessKey: minioadmin
