# S2 Lite (single-node) for Phase 2b, on the role=server node. S2 is its own
# stream substrate (NOT durable-streams); it persists to an S3-compatible object
# store — here the in-cluster MinIO `s2-bench` bucket — so it shares the same
# object-tier substrate as DS-rust/ursula (MinIO on local NVMe). The ds-bench
# `--api-style s2` client speaks S2's REST: POST /v1/basins, /v1/streams,
# /v1/streams/{s}/records with `Bearer ignored` (S2 Lite local does not validate
# the token). Public image, anonymous pull.
#
# S2 is excluded from catch-up + mixed (the bench tool bails for those on S2);
# the matrix runs only multi-stream + fan-out against it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: s2lite
  namespace: ds-bench
  labels: { app: s2lite }
spec:
  replicas: 1
  selector: { matchLabels: { app: s2lite } }
  template:
    metadata: { labels: { app: s2lite } }
    spec:
      nodeSelector: { role: server }
      containers:
        - name: s2lite
          image: ghcr.io/s2-streamstore/s2:latest
          imagePullPolicy: Always
          args: ["lite", "--bucket", "s2-bench", "--path", "s2lite", "--port", "80"]
          env:
            - { name: AWS_ENDPOINT_URL_S3, value: "http://minio:9000" }
            - { name: AWS_ACCESS_KEY_ID, value: minioadmin }
            - { name: AWS_SECRET_ACCESS_KEY, value: minioadmin }
            - { name: AWS_REGION, value: us-east-1 }
          ports:
            - containerPort: 80
          resources:
            requests: { memory: "2Gi", cpu: "2" }
            limits: { memory: "6Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: s2lite
  namespace: ds-bench
spec:
  selector: { app: s2lite }
  ports: [{ port: 80, targetPort: 80 }]
