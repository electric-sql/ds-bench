# Cross-node ds-bench fleet (Phase 2b). Indexed Job on the role=client pool;
# pods spread across the client nodes. Each pod runs ds-bench, writes its
# .hdr/.json to a local emptyDir (/out), then uploads them to in-cluster MinIO
# under s3://bench-results/${RUN_ID}/ — no shared volume, so it is multi-node
# safe. The coordinator later downloads the run prefix and merges.
#
# Substituted by the run scripts before apply:
#   ${PROJECT}      registry project
#   ${RUN_ID}       unique run prefix in the bench-results bucket
#   ${PARALLELISM}  number of fleet pods (= completions)
#   ${BENCH_CMD}    ds-bench subcommand + flags (per-workload)
#   ${OUT_PREFIX}   filename prefix for this workload's json (e.g. ms / fan-out)
apiVersion: batch/v1
kind: Job
metadata:
  name: bench-fleet
  namespace: ds-bench
spec:
  completions: ${PARALLELISM}
  parallelism: ${PARALLELISM}
  completionMode: Indexed
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector: ${NODESEL_CLIENT}
      containers:
        - name: ds-bench
          image: ${IMG_DSBENCH}
          imagePullPolicy: ${PULL_POLICY}
          env:
            - { name: DS_BENCH_HDR_OUT, value: /out }
            - { name: RUN_ID, value: "${RUN_ID}" }
          command: ["/bin/sh", "-c"]
          args:
            - >
              DS_BENCH_INSTANCE="$JOB_COMPLETION_INDEX"
              ds-bench ${BENCH_CMD}
              > /out/${OUT_PREFIX}-${JOB_COMPLETION_INDEX}.json &&
              mc alias set local http://minio:9000 minioadmin minioadmin &&
              mc cp --recursive /out/ "local/bench-results/${RUN_ID}/"
          volumeMounts:
            - { name: out, mountPath: /out }
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
      volumes:
        - name: out
          emptyDir: {}
