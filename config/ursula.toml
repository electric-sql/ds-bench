[server]
listen = "0.0.0.0:4437"

[raft]
node_id = 1
# [raft.peers] intentionally omitted -> Topology::SingleNode

[raft.wal]
backend = "disk"
path = "/var/lib/ursula/data"

[storage.cold]
backend = "s3"

[storage.cold.s3]
bucket = "ursula"
endpoint = "http://minio:9000"
region = "us-east-1"
access_key_id = "minioadmin"
secret_access_key = "minioadmin"
